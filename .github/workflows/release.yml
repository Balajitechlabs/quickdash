name: Android Release Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Decode keystore
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks
          else
            echo "No keystore provided"
          fi
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Decode google-services.json
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON_BASE64" ]; then
            echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 -d > app/google-services.json
          else
            echo "No google-services.json provided"
          fi
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}

      - name: Build Signed Release APK & AAB
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -f "keystore.jks" ]; then
            ./gradlew clean assembleRelease bundleRelease \
              -Pandroid.injected.signing.store.file=$(pwd)/keystore.jks \
              -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
              -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
              -Pandroid.injected.signing.key.password=$KEY_PASSWORD
          else
            echo "No keystore provided, building unsigned release apk & aab"
            ./gradlew clean assembleRelease bundleRelease
          fi

      - name: Get App Version
        id: version
        run: |
          VERSION_NAME=$(grep "versionName =" app/build.gradle.kts | awk '{print $3}' | tr -d '"')
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV

      - name: Create GitHub Release
        id: create_release
        if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION_NAME }}-${{ github.run_number }}
          name: QuickDash v${{ env.VERSION_NAME }}
          body: |
            ## QuickDash v${{ env.VERSION_NAME }}
            
            ### Install Instructions
            1. Download `app-release.apk` below
            2. On your Android phone go to **Settings → Install unknown apps** and allow your browser/file manager
            3. Open the downloaded APK and tap **Install**
            
            *(The `app-release.aab` file is for Google Play Console Internal Testing)*
            
            > Built automatically by GitHub Actions 🚀
          draft: false
          prerelease: false
          files: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/bundle/release/app-release.aab

      - name: Update README Download Link
        if: github.ref == 'refs/heads/main'
        run: |
          NEW_URL="https://github.com/${{ github.repository }}/releases/download/v${{ env.VERSION_NAME }}-${{ github.run_number }}/app-release.apk"
          echo "Updating README download link to: $NEW_URL"
          
          # Replace the release APK link in README
          sed -i -E "s|href=\"https://github.com/[a-zA-Z0-9.\-_]+/[a-zA-Z0-9.\-_]+/releases/download/[a-zA-Z0-9.\-_+]+/app-release.apk\"|href=\"$NEW_URL\"|g" README.md
          
          # Configure Git and commit the change
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: update README download link for v${{ env.VERSION_NAME }} [skip ci]" || echo "No changes to commit"
          git push

